name: security-audit

# Scans Python + JS dependencies for known CVEs.
# Runs on every push to main, every PR, and weekly on Monday morning UTC
# so a newly-disclosed CVE in a pinned dep gets surfaced even without code changes.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"   # Mondays 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  python-audit:
    name: pip-audit (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit backend dependencies
        # Fails on any CVE. Use `--ignore-vuln <id>` to whitelist temporarily
        # if a fix isn't available yet.
        run: pip-audit --requirement backend/requirements.txt --strict

  npm-audit:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Audit
        # Fails the job on high or critical findings. Moderate/low are reported but don't block.
        run: npm audit --audit-level=high
